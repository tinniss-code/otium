name: Otium Daily Research

on:
  workflow_dispatch: # Allows you to run it manually
  schedule:
    - cron: '0 9 * * *' # Runs daily at 9 AM

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fpdf2 requests google-genai tavily-python python-dotenv

      - name: 🤖 Run Research Agent
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent7.py

      # --- THIS IS THE NEW CRITICAL STEP ---
      - name: 🔍 Locate and Prepare PDF
        run: |
          echo "Searching for the PDF file..."
          # This finds the file wherever it was saved and moves it to the root
          find . -name "daily_research.pdf" -exec mv {} . \;
          # This confirms it exists in the root for the next step
          if [ -f "daily_research.pdf" ]; then
            echo "✅ PDF successfully located in root."
            ls -la daily_research.pdf
          else
            echo "❌ PDF NOT FOUND anywhere in the workspace."
            exit 1
          fi

      - name: 📤 Upload Research PDF
        uses: actions/upload-artifact@v4
        with:
          name: daily-senior-research-pdf
          path: daily_research.pdf
          if-no-files-found: error
          retention-days: 7
