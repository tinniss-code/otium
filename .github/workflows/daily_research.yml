name: Otium Daily Research

on:
  workflow_dispatch: # Allows you to run it manually
  schedule:
    - cron: '0 9 * * *' # Runs daily at 9 AM

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed if you want to save the PDF directly to the repo
    
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fpdf2 requests google-genai tavily-python python-dotenv

      - name: 🤖 Run Research Agent
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent7.py

      - name: 📤 Upload Research PDF
        uses: actions/upload-artifact@v4
        with:
          name: daily-senior-research-pdf
          path: daily_research.pdf
          if-no-files-found: error
