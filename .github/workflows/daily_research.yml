name: Otium Daily Research
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install
        run: pip install fpdf2 requests google-genai tavily-python python-dotenv

      - name: 🤖 Run Agent
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python agent7.py
          ls -la  # Immediately check if the file exists

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-senior-research-pdf
          path: daily_research.pdf
          if-no-files-found: error
