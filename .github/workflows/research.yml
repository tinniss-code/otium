name: Daily Senior Research Update

on:
  schedule:
    # Runs automatically at 13:00 UTC (8:00 AM EST)
    - cron: '0 13 * * *'
  # Adds the manual "Test Run" button in the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: Allows the bot to push research.xml to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tavily-python google-generativeai

      - name: Run Research Script
        # THIS IS THE PART THAT FIXES YOUR ERROR
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent7.py

      - name: Debug - List Files
        run: ls -R

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only push if the file was successfully created
          if [ -f "research.xml" ]; then
            git add research.xml
            git commit -m "Automated Research Update: $(date)" || echo "No changes to commit"
            git push
          else
            echo "❌ Error: research.xml was not created. Check script logs."
            exit 1
          fi
